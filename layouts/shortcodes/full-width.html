<script>
  (() => {
    const widenArticle = () => {
      ["#single_header", ".article-content"].forEach((selector) => {
        document.querySelector(selector)?.classList.replace("max-w-prose", "max-w-full");
      });
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", widenArticle, { once: true });
    } else {
      widenArticle();
    }
  })();
</script>
